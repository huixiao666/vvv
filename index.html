        // ---------- 辅助：生成唯一标签 (自动去重) ----------
        function makeUniqueTag(baseName, usedTags) {
            let candidate = baseName;
            if (!candidate) candidate = 'node';
            // 清理非法字符 (只保留字母数字中文 - _ .)
            candidate = candidate.replace(/[^\w\u4e00-\u9fa5\-_.]/g, '_').substring(0, 30);
            if (!candidate) candidate = 'node';
            
            let finalTag = candidate;
            let counter = 1;
            while (usedTags.has(finalTag)) {
                finalTag = `${candidate}-${counter}`;
                counter++;
            }
            usedTags.add(finalTag);
            return finalTag;
        }

            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            const qIdx = main.indexOf('?');
            let serverPart = main, query = '';
            if (qIdx !== -1) { serverPart = main.substring(0,qIdx); query = main.substring(qIdx+1); }
            const at = serverPart.indexOf('@');
            if (at === -1) throw new Error('Invalid VLESS');
            const uuid = serverPart.substring(0, at);
            const hostPort = serverPart.substring(at+1);
            let server, port;
            const col = hostPort.lastIndexOf(':');
            if (col !== -1) { server = hostPort.substring(0,col); port = parseInt(hostPort.substring(col+1)); }
            else { server = hostPort; port = 443; }
            const params = new URLSearchParams(query);
            const type = params.get('type') || 'tcp';
            const security = params.get('security') || 'none';
            const flow = params.get('flow') || '';
            const sni = params.get('sni') || params.get('peer') || server;
            const alpn = params.get('alpn');
            const fp = params.get('fp') || (security==='tls'?'chrome':undefined);
            let path = params.get('path') || '/'; try { path = decodeURIComponent(path); } catch(e){}
            const host = params.get('host') || sni;
            const serviceName = params.get('serviceName') || '';
            const pbk = params.get('pbk') || '';
            const sid = params.get('sid') || '';
            
            const rawTag = fragment || `${server}:${port}`;
            const node = {
                _rawTag: rawTag,
                type: 'vless',
                server,
                server_port: port,
                uuid,
                domain_resolver: 'alidns-quic'
            };
            if (flow) node.flow = flow;
            
            if (type !== 'tcp') {
                const transport = { type };
                if (type === 'ws') { transport.path = path; if (host) transport.headers = { Host: host }; }
                else if (type === 'grpc') transport.service_name = serviceName;
                else if (type === 'httpupgrade') { transport.path = path; if (host) transport.host = host; }
                node.transport = transport;
            }
            
            if (security === 'tls') {
                node.tls = { enabled: true, server_name: sni };
                if (alpn) node.tls.alpn = alpn.split(',').map(s=>s.trim());
                if (fp) node.tls.utls = { enabled: true, fingerprint: fp };
                // 适配合成版模板，默认添加ech配置
                node.tls.ech = { enabled: false };
            } else if (security === 'reality') {
                node.tls = { enabled: true, server_name: sni, reality: { enabled: true } };
                if (pbk) node.tls.reality.public_key = pbk;
                if (sid) node.tls.reality.short_id = sid;
                if (fp) node.tls.utls = { enabled: true, fingerprint: fp };
            }
            return node;
        }
        function parseVmess(url) {
            const b64 = url.substring(8);
            const jsonStr = atob(b64);
            const vm = JSON.parse(jsonStr);
            const rawTag = vm.ps || `${vm.add}:${vm.port}`;
            const node = {
                _rawTag: rawTag,
                type: 'vmess',
                server: vm.add,
                server_port: parseInt(vm.port) || 443,
                uuid: vm.id,
                security: vm.scy || 'auto',
                alter_id: parseInt(vm.aid) || 0,
                domain_resolver: 'alidns-quic'
            };
            const net = vm.net;
            if (net && net !== 'tcp') {
                const transport = { type: net };
                if (net === 'ws') {
                    transport.path = vm.path || '/';
                    if (vm.host) transport.headers = { Host: vm.host };
                } else if (net === 'grpc') {
                    transport.service_name = vm.path || '';
                } else if (net === 'h2') {
                    transport.type = 'http';
                    transport.host = vm.host ? [vm.host] : undefined;
                    transport.path = vm.path;
                }
                node.transport = transport;
            }
            if (vm.tls === 'tls') {
                node.tls = { enabled: true, server_name: vm.sni || vm.add };
                if (vm.alpn) node.tls.alpn = vm.alpn.split(',');
                if (vm.fingerprint) node.tls.utls = { enabled: true, fingerprint: vm.fingerprint };
                // 适配合成版模板，默认添加ech配置
                node.tls.ech = { enabled: false };
            }
            return node;
        }
        function parseTrojan(url) {
            let main = url.substring(9);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            const at = main.indexOf('@');
            if (at === -1) throw new Error('Invalid Trojan');
            const password = main.substring(0, at);
            const hostPort = main.substring(at+1);
            const qm = hostPort.indexOf('?');
            let server, port, query='';
            if (qm !== -1) {
                const hp = hostPort.substring(0, qm);
                query = hostPort.substring(qm+1);
                const col = hp.lastIndexOf(':');
                if (col !== -1) { server = hp.substring(0,col); port = parseInt(hp.substring(col+1)); }
                else { server = hp; port = 443; }
            } else {
                const col = hostPort.lastIndexOf(':');
                if (col !== -1) { server = hostPort.substring(0,col); port = parseInt(hostPort.substring(col+1)); }
                else { server = hostPort; port = 443; }
            }
            const params = new URLSearchParams(query);
            const sni = params.get('sni') || server;
            const fp = params.get('fp') || 'chrome';
            const alpn = params.get('alpn');
            const type = params.get('type') || 'tcp';
            const path = params.get('path') || '/';
            const host = params.get('host') || sni;
            
            const rawTag = fragment || `${server}:${port}`;
            const node = {
                _rawTag: rawTag,
                type: 'trojan',
                server,
                server_port: port,
                password,
                domain_resolver: 'alidns-quic'
            };
            if (type !== 'tcp') {
                const transport = { type };
                if (type === 'ws') { transport.path = path; if (host) transport.headers = { Host: host }; }
                node.transport = transport;
            }
            node.tls = { enabled: true, server_name: sni };
            if (alpn) node.tls.alpn = alpn.split(',');
            if (fp) node.tls.utls = { enabled: true, fingerprint: fp };
            // 适配合成版模板，默认添加ech配置
            node.tls.ech = { enabled: false };
            return node;
        }
        function parseShadowsocks(url) {
            let main = url.substring(5);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            let method, password, server, port;
            if (main.includes('@')) {
                const at = main.lastIndexOf('@');
                const userInfo = main.substring(0, at);
                const hostPort = main.substring(at+1);
                const decoded = atob(userInfo);
                const colon = decoded.indexOf(':');
                method = decoded.substring(0, colon);
                password = decoded.substring(colon+1);
                const col = hostPort.lastIndexOf(':');
                server = col!==-1 ? hostPort.substring(0,col) : hostPort;
                port = col!==-1 ? parseInt(hostPort.substring(col+1)) : 8388;
            } else {
                const decoded = atob(main);
                const parts = decoded.split('@');
                const mp = parts[0].split(':');
                method = mp[0];
                password = mp[1];
                const hp = parts[1].split(':');
                server = hp[0];
                port = parseInt(hp[1]);
            }
            const rawTag = fragment || `${server}:${port}`;
            return {
                _rawTag: rawTag,
                type: 'shadowsocks',
                server,
                server_port: port,
                method,
                password,
                domain_resolver: 'alidns-quic'
            };
        }
        function parseHysteria2(url) {
            let u = url.startsWith('hysteria2://') ? url : url.replace('hy2://', 'hysteria2://');
            let main = u.substring(12);
            let fragment = '';
            const hash = main.indexOf('#');
            if (hash !== -1) { fragment = decodeURIComponent(main.substring(hash+1)); main = main.substring(0,hash); }
            const at = main.indexOf('@');
            if (at === -1) throw new Error('Invalid Hysteria2');
            const password = main.substring(0, at);
            const hostPort = main.substring(at+1);
            const qm = hostPort.indexOf('?');
            let server, port, query='';
            if (qm !== -1) {
                const hp = hostPort.substring(0, qm);
                query = hostPort.substring(qm+1);
                const col = hp.lastIndexOf(':');
                if (col !== -1) { server = hp.substring(0,col); port = parseInt(hp.substring(col+1)); }
                else { server = hp; port = 443; }
            } else {
                const col = hostPort.lastIndexOf(':');
                if (col !== -1) { server = hostPort.substring(0,col); port = parseInt(hostPort.substring(col+1)); }
                else { server = hostPort; port = 443; }
            }
            const params = new URLSearchParams(query);
            const sni = params.get('sni') || server;
            const insecure = params.get('insecure') === '1';
            const obfs = params.get('obfs');
            const obfsPassword = params.get('obfs-password');
            
            const rawTag = fragment || `${server}:${port}`;
            const node = {
                _rawTag: rawTag,
                type: 'hysteria2',
                server,
                server_port: port,
                password,
                domain_resolver: 'alidns-quic',
                tls: { enabled: true, server_name: sni, insecure }
            };
            if (obfs) {
                node.obfs = { type: obfs };
                if (obfsPassword) node.obfs.password = obfsPassword;
            }
            return node;
        }
        function parseLine(line) {
            line = line.trim();
            if (!line) return null;
            try {
                if (line.startsWith('vless://')) return parseVless(line);
                if (line.startsWith('vmess://')) return parseVmess(line);
                if (line.startsWith('trojan://')) return parseTrojan(line);
                if (line.startsWith('ss://')) return parseShadowsocks(line);
                if (line.startsWith('hysteria2://') || line.startsWith('hy2://')) return parseHysteria2(line);
            } catch (e) {
                console.warn('解析失败:', line, e);
                return null;
            }
            return null;
        }
        // ---------- 构建 outbounds (严格对齐合成.txt模板结构) ----------
        function buildOutbounds(rawNodes) {
            // 保留标签：避免与系统内置tag冲突
            const usedTags = new Set(['DIRECT', 'AUTO', 'PROXY', 'GLOBAL', 'CN']);
            const finalNodes = [];
            
            // 1. 内置DIRECT出站（与合成.txt模板完全一致）
            const directOutbound = {
                "type": "direct",
                "tag": "DIRECT",
                "domain_resolver": "alidns-quic"
            };
            // 2. 处理用户节点，生成唯一tag
            for (let raw of rawNodes) {
                const baseTag = raw._rawTag || 'node';
                delete raw._rawTag;
                const uniqueTag = makeUniqueTag(baseTag, usedTags);
                raw.tag = uniqueTag;
                finalNodes.push(raw);
            }
            
            // 3. 提取用户节点tag列表，用于自动选路和选择器
            const nodeTags = finalNodes.map(n => n.tag);
            
            // 4. 生成AUTO自动测速urltest（与合成.txt模板完全一致）
            const autoUrltest = {
                "type": "urltest",
                "tag": "AUTO",
                "outbounds": nodeTags,
                "url": "http://cp.cloudflare.com/",
                "interval": "10m",
                "tolerance": 50,
                "idle_timeout": "30m",
                "interrupt_exist_connections": false
            };
            // 5. 生成PROXY手动选择器（与合成.txt模板完全一致）
            const proxySelector = {
                "type": "selector",
                "tag": "PROXY",
                "outbounds": nodeTags.length > 0 ? ["AUTO", ...nodeTags, "DIRECT"] : ["DIRECT"],
                "default": nodeTags.length > 0 ? "AUTO" : "DIRECT",
                "interrupt_exist_connections": false
            };
            // 6. 生成GLOBAL全局选择器（与合成.txt模板完全一致）
            const globalSelector = {
                "type": "selector",
                "tag": "GLOBAL",
                "outbounds": ["PROXY", "DIRECT"],
                "default": "PROXY",
                "interrupt_exist_connections": false
            };
            // 7. 生成CN国内选择器（与合成.txt模板完全一致）
            const cnSelector = {
                "type": "selector",
                "tag": "CN",
                "outbounds": ["DIRECT", "PROXY"],
                "default": "DIRECT",
                "interrupt_exist_connections": false
            };
            
            // 按sing-box引用规范拼接完整outbounds数组（先定义节点，再引用）
            return [
                directOutbound,
                ...finalNodes,
                ...(nodeTags.length > 0 ? [autoUrltest] : []),
                proxySelector,
                globalSelector,
                cnSelector
            ];
        }
        // ---------- UI交互逻辑 ----------
        const inputArea = document.getElementById('inputArea');
        const outputPre = document.getElementById('outputConfig');
        const nodeBadge = document.getElementById('nodeCountBadge');
        const feedbackDiv = document.getElementById('copyFeedback');
        
        function showFeedback(msg) {
            feedbackDiv.innerHTML = `<span class="toast-msg">${msg}</span>`;
            setTimeout(() => feedbackDiv.innerHTML = '', 2500);
        }
        // 解析生成配置
        document.getElementById('convertBtn').addEventListener('click', () => {
            try {
                const raw = inputArea.value.trim();
                if (!raw) throw new Error('请输入节点链接');
                const lines = raw.split(/\n/);
                const rawNodes = [];
                for (let line of lines) {
                    const node = parseLine(line);
                    if (node) rawNodes.push(node);
                }
                if (rawNodes.length === 0) throw new Error('未识别到有效节点');
                const outbounds = buildOutbounds(rawNodes);
                const config = JSON.parse(JSON.stringify(BASE_TEMPLATE));
                config.outbounds = outbounds;
                outputPre.textContent = JSON.stringify(config, null, 2);
                nodeBadge.textContent = `${rawNodes.length} 个节点`;
                showFeedback(`✅ 成功解析 ${rawNodes.length} 个节点，配置已生成`);
            } catch (e) {
                alert('转换失败: ' + e.message);
                outputPre.textContent = '// 解析错误: ' + e.message;
                nodeBadge.textContent = '0 个节点';
            }
        });
        // 一键复制配置
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const text = outputPre.textContent;
            if (!text || text.startsWith('//')) { showFeedback('无有效配置可复制'); return; }
            try {
                await navigator.clipboard.writeText(text);
                showFeedback('📋 配置已复制到剪贴板');
            } catch {
                const ta = document.createElement('textarea'); 
                ta.value = text; 
                document.body.appendChild(ta);
                ta.select(); 
                document.execCommand('copy'); 
                document.body.removeChild(ta);
                showFeedback('📋 复制成功');
            }
        });
        // 清空输入输出
        document.getElementById('clearBtn').addEventListener('click', () => {
            inputArea.value = '';
            outputPre.textContent = '// 点击「解析并生成配置」后显示完整 JSON …';

        document.getElementById('sampleBtn').addEventListener('click', () => {
